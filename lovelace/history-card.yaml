# Historical peak level — built-in card, no HACS dependencies.
# Shows the last 7 days of recorder-backed state changes.
#
# Drop into Lovelace: Edit Dashboard → Add Card → Manual → paste this YAML.
type: history-graph
title: Peak Level History
hours_to_show: 168
refresh_interval: 300
entities:
  - entity: sensor.peak_forecast_current_peak_level
    name: Forecast level
  - entity: binary_sensor.peak_forecast_peak_active
    name: Peak active
